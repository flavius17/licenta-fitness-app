<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profilul Meu - 21 GYM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        .navbar-custom {
            background-color: #1a0505;
            border-bottom: 2px solid #8B0000;
            padding: 15px 0;
        }
        
        .profile-header {
            text-align: center;
            padding: 30px 0;
        }
        
        .avatar-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: #1a1a1a;
            border: 3px solid #ff3333;
            margin: 0 auto 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 51, 51, 0.2);
        }

        .avatar-circle i {
            font-size: 60px;
            color: #666;
        }

        .user-name {
            font-family: 'Black Ops One', cursive;
            font-size: 1.8rem;
            color: #fff;
            margin-bottom: 5px;
        }

        .user-email {
            color: #888;
            font-size: 0.9rem;
        }

        .stats-container {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 30px;
        }

        .stat-card {
            background-color: #0f0f0f;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            flex: 1;
            text-align: center;
            transition: 0.3s;
        }

        .stat-card:hover {
            border-color: #ff3333;
            transform: translateY(-3px);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ff3333;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #aaa;
            text-transform: uppercase;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #ff3333;
        }

        
        .nutrition-card {
            background-color: #0f0f0f;
            border: 1px solid #333;
            border-left: 4px solid #ff3333;
            border-radius: 12px;
            padding: 20px;
            margin-top: 40px;
            position: relative;
        }
        
        .nutrition-title {
            font-family: 'Black Ops One', cursive;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
            text-transform: uppercase;
        }

        .macro-value {
            font-family: 'Black Ops One', cursive;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-custom">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="/dashboard" style="text-decoration: none;">
                <span style="font-family: 'Black Ops One', cursive; font-size: 1.8rem; color: #ffffff;">21</span>
                <span style="font-family: 'Black Ops One', cursive; font-size: 1.8rem; color: #ff3333; margin-left: 5px;">GYM</span>
            </a>
            <span style="font-family: 'Black Ops One'; font-size: 1.5rem;">
                <span class="text-white">MY</span> <span style="color: #ff3333;">PROFILE</span>
            </span>
            <div style="width: 24px;"></div> 
        </div>
    </nav>

    <div class="container" style="max-width: 500px;">
        
        <div class="profile-header">
            <div class="avatar-circle">
                <i class="fas fa-user"></i>
            </div>
            <div class="user-name" th:text="${numeUtilizator}">Nume User</div>
            <div class="user-email" th:text="${email}">email@exemplu.com</div>
        </div>

        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-value"><span th:text="${greutate}">0</span> kg</div>
                <div class="stat-label">Greutate</div>
            </div>
            <div class="stat-card">
                <div class="stat-value"><span th:text="${inaltime}">0</span> cm</div>
                <div class="stat-label">Înălțime</div>
            </div>
            <div class="stat-card">
                <div class="stat-value"><span th:text="${varsta}">0</span> ani</div>
                <div class="stat-label">Vârstă</div>
            </div>
        </div>

        <form th:action="@{/profile/update}" method="post" class="mt-4">
            <div class="mb-3">
                <label class="form-label text-secondary small">Nume Complet</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-light">
                        <i class="bi bi-person"></i>
                    </span>
                    <input type="text" name="nume" th:value="${numeUtilizator != 'null null' ? numeUtilizator : ''}" class="form-control bg-dark text-light border-secondary" placeholder="Introdu numele tău...">
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label text-secondary small">Greutate (kg)</label>
                    <input type="number" step="0.1" name="greutate" th:value="${greutate}" class="form-control bg-dark text-light border-secondary">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label text-secondary small">Înălțime (cm)</label>
                    <input type="number" name="inaltime" th:value="${inaltime}" class="form-control bg-dark text-light border-secondary">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label text-secondary small">Vârstă (ani)</label>
                <input type="number" name="varsta" th:value="${varsta}" class="form-control bg-dark text-light border-secondary">
            </div>
            
<div class="mb-3">
    <label class="form-label text-white">Setează o parolă (opțional)</label>
    <input type="password" name="newPassword" class="form-control bg-dark text-white" placeholder="Parolă nouă">
</div>
<div class="mb-3">
    <label class="form-label text-white">Confirmă parola</label>
    <input type="password" name="confirmPassword" class="form-control bg-dark text-white" placeholder="Repetă parola">
</div>

            <button type="submit" class="btn btn-danger w-100 py-2 fw-bold mt-3">
                SALVEAZĂ MODIFICĂRILE
            </button>
        </form>
        <br>
        <div class="text-center mb-5">
            <a href="/home" class="text-secondary text-decoration-none small">Deconectare</a>
        </div>

    </div>

</body>
</html>
