<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>21 Gym - Calculator TDEE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">
    
    <style>
        /* --- STILURI GENERALE --- */
        body {
            background-color: #0a0a0a;
            color: #bfbfbf; /* Text general gri */
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3, h4, .btn, .navbar-brand, .form-label {
            font-family: 'Black Ops One', cursive !important;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .navbar-custom { background-color: #1a0505; border-bottom: 2px solid #8B0000; }
        .card-custom { background-color: #141414; border: 1px solid #333; border-top: 5px solid #8B0000; }

        /* --- INPUTURI ȘI SELECTOARE --- */
        .form-control, .form-select {
            background-color: #2b2b2b !important;
            border: 1px solid #555 !important;
            color: #bfbfbf !important; /* Text gri în căsuțe */
            padding: 12px;
            font-weight: 500;
        }

        .form-select option {
            background-color: #2b2b2b !important;
            color: #bfbfbf !important;
        }

        ::placeholder {
            color: #888888 !important;
            opacity: 1;
        }

        .form-control:focus, .form-select:focus {
            background-color: #333 !important;
            border-color: #ff3333 !important;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.2) !important;
            color: #bfbfbf !important;
        }

        /* Săgeata gri la dropdown */
        .form-select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23bfbfbf' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e") !important;
        }

        .btn-rosu {
            background-color: #8B0000;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            font-size: 1.2rem;
            transition: 0.3s;
        }
        .btn-rosu:hover { background-color: #ff0000; box-shadow: 0 0 20px rgba(255,0,0,0.4); }

        /* --- REZULTATE CLICKABILE --- */
        .rezultat-card {
            background-color: #222;
            border: 1px solid #807f7f;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
        
        /* Cifrele rezultatelor - gri */
        .rezultat-card h2 {
            color: #bfbfbf !important; 
            text-shadow: none !important;
        }

        .text-accent { color: #ff3333 !important; }
        .text-green { color: #28a745 !important; }
        .text-blue { color: #17a2b8 !important; }

        .text-secondary-custom {
            color: #888888 !important;
        }

        .form-label {
            color: #bfbfbf !important;
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        /* Hover Effect pentru Carduri */
        .hover-effect {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
        }
        .hover-effect:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            background-color: #2a2a2a;
            border-color: #fff !important; /* Bordură albă la hover */
        }
        .card-link {
            color: inherit;
            display: block;
            text-decoration: none;
        }
        .card-link:hover {
            color: inherit;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark navbar-custom py-3 shadow">
        <div class="container">
            <a href="/dashboard" style="text-decoration: none;"><span style="font-family: 'Black Ops One', cursive; font-size: 1.8rem; color: #ffffff;">21</span><span style="font-family: 'Black Ops One', cursive; font-size: 1.8rem; color: #ff3333; margin-left: 5px;">GYM</span></a>
        </div>
    </nav>

    <div class="container mt-5 mb-5 d-flex justify-content-center">
        <div class="col-md-8">
            
            <div class="card card-custom p-4 p-md-5 shadow-lg">
                <p class="text-secondary-custom text-center mb-4 fs-5">
                    Află caloriile necesare pentru menținere, slăbire sau masă musculară.
                </p>

                <form action="/tdee" method="post">
                    <div class="row g-3">
                        
                        <div class="col-md-6">
                            <label class="form-label">GEN</label>
                            <select name="gen" class="form-select">
                                <option value="masculin">Masculin</option>
                                <option value="feminin">Feminin</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">VÂRSTĂ</label>
                            <input type="number" name="varsta" class="form-control" th:value="${oldVarsta}" placeholder="Ani" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">GREUTATE (KG)</label>
                            <input type="number" step="0.1" name="greutate" th:value="${oldGreutate}" class="form-control" placeholder="Kg" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">ÎNĂLȚIME (CM)</label>
                            <input type="number" name="inaltime" th:value="${oldInaltime}" class="form-control" placeholder="Cm" required>
                        </div>

                        <div class="col-12">
                            <label class="form-label">NIVEL DE ACTIVITATE</label>
                            <select name="activitate" class="form-select">
                                <option value="1.2">Sedentar (Birou, fără sport)</option>
                                <option value="1.375">Ușor Activ (1-3 zile sport/săpt)</option>
                                <option value="1.55">Moderat (3-5 zile sport/săpt)</option>
                                <option value="1.725">Foarte Activ (6-7 zile sport/săpt)</option>
                                <option value="1.9">Extrem (Muncă fizică grea / Dublu antrenament)</option>
                            </select>
                        </div>

                    </div>
                    
                    <button type="submit" class="btn btn-rosu mt-4">CALCULEAZĂ NECESARUL</button>
                </form>

                <div th:if="${mentinere != null}" class="row text-center mt-4 g-3">
                    
                    <div class="col-md-4">
                        <a th:href="@{/macros(calorii=${slabire}, tip='SLĂBIRE')}" class="card-link">
                            <div class="rezultat-card hover-effect" style="border-color: #28a745;">
                                <h5 class="text-green">SLĂBIRE</h5>
                                <h2 class="fw-bold" th:text="${slabire}">2000</h2>
                                <small class="text-secondary-custom">Calorii / zi</small>
                            </div>
                        </a>
                    </div>

                    <div class="col-md-4">
                        <a th:href="@{/macros(calorii=${mentinere}, tip='MENȚINERE')}" class="card-link">
                            <div class="rezultat-card hover-effect" style="border-color: #ff3333;">
                                <h5 class="text-accent">MENȚINERE</h5>
                                <h2 class="fw-bold" th:text="${mentinere}">2500</h2>
                                <small class="text-secondary-custom">Calorii / zi</small>
                            </div>
                        </a>
                    </div>

                    <div class="col-md-4">
                        <a th:href="@{/macros(calorii=${masa}, tip='MASĂ MUSCULARĂ')}" class="card-link">
                            <div class="rezultat-card hover-effect" style="border-color: #17a2b8;">
                                <h5 class="text-blue">MASĂ MUSCULARĂ</h5>
                                <h2 class="fw-bold" th:text="${masa}">3000</h2>
                                <small class="text-secondary-custom">Calorii / zi</small>
                            </div>
                        </a>
                    </div>

                </div>

            </div>
        </div>
    </div>

</body>
</html>
