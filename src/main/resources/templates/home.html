<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>21 Gym - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        
        h1, h2, h3, h4, .navbar-brand, .btn {
            font-family: 'Black Ops One', cursive !important;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

       
        .navbar-custom {
            background-color: #1a0505;
            border-bottom: 2px solid #8B0000;
        }

        
        .brand-logo {
            font-size: 2rem;
            color: #ff3333;
            text-shadow: 2px 2px 0px #000;
        }

        
        .btn-rosu {
            background-color: #8B0000;
            color: white;
            border: none;
            padding: 15px 10px; 
            font-size: 1.3rem;
            width: 100%; 
            transition: 0.3s;
        }
        .btn-rosu:hover {
            background-color: #ff0000;
            color: white;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.6);
        }

        
        .btn-outline-custom {
            background-color: transparent;
            color: white;
            border: 2px solid #555; 
            padding: 15px 10px;
            font-size: 1.3rem;
            width: 100%;
            transition: 0.3s;
        }
        .btn-outline-custom:hover {
            border-color: #ffffff; 
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

       
        .card-custom {
            background-color: #141414;
            border: 1px solid #333;
            border-top: 5px solid #8B0000;
        }

        .text-accent {
            color: #ff3333;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom py-3 shadow">
        <div class="container">
            <a class="navbar-brand brand-logo" href="#">
                21 <span style="color: white;">GYM</span>
            </a>
        </div>
    </nav>

    <div class="container mt-5 text-center flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="row w-100 justify-content-center">
            <div class="col-lg-8"> <h1 class="display-3 mb-4">
                    DEPĂȘEȘTE-ȚI <br> 
                    <span class="text-accent">LIMITELE</span>
                </h1>

                <div class="card card-custom p-5 shadow-lg mt-5">
                    <h2 class="mb-4 text-light">BINE AI VENIT LA 21 GYM</h2>
                    
                    <p class="text-secondary mb-5 fs-5" style="font-family: 'Segoe UI', sans-serif;">
                        Locul unde scuzele nu există. Monitorizează-ți progresul și atinge forma maximă.
                    </p>
                    
                    <div class="row g-3">
                        
                        <div class="col-md-6">
                            <a href="/register" class="btn btn-rosu">
                                ÎNREGISTRARE
                            </a>
                        </div>

                        <div class="col-md-6">
                            <a href="/login" class="btn btn-outline-custom">
                                LOGARE
                            </a>
                        </div>

                    </div>

                </div>

            </div>
        </div>
    </div>

</body>
</html>
