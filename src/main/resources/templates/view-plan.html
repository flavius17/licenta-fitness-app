<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planul tău AI - 21 GYM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: white; font-family: 'Segoe UI', sans-serif; }
        .navbar-custom { background-color: #1a0505; border-bottom: 2px solid #8B0000; }
        .gym-logo { font-family: 'Black Ops One'; font-size: 1.8rem; color: white; }
        .red-text { color: #ff3333; }
        .plan-container { background-color: #111; border: 1px solid #333; border-radius: 15px; padding: 3rem; margin-bottom: 3rem; }
        
        /* Stiluri pentru textul generat de AI (HTML-ul care vine din Java) */
        .ai-output h3 { font-family: 'Black Ops One'; color: #ff3333; margin-top: 2rem; margin-bottom: 1rem; border-bottom: 1px solid #444; padding-bottom: 0.5rem; }
        .ai-output ul { list-style: none; padding-left: 0; }
        .ai-output li { background: #1a1a1a; margin-bottom: 0.5rem; padding: 1rem; border-radius: 8px; border-left: 4px solid #8B0000; }
        .ai-output strong { color: #fff; }
        
        .btn-outline-red { border: 1px solid #ff3333; color: #ff3333; font-family: 'Black Ops One'; }
        .btn-outline-red:hover { background-color: #ff3333; color: white; }
        .btn-danger { background-color: #8B0000; border: none; font-family: 'Black Ops One'; }
        .btn-danger:hover { background-color: #ff3333; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark navbar-custom py-3 mb-5">
        <div class="container">
            <a href="/dashboard" class="navbar-brand gym-logo">21 <span class="red-text">GYM</span> AI</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-9">
                <h1 class="mb-4" style="font-family: 'Black Ops One'; text-align: center;">ANTRENAMENTUL TĂU <span class="red-text">PERSONALIZAT</span></h1>
                
                <div class="plan-container shadow-lg">
                    
                    <div class="ai-output" th:utext="${planAI}"></div>
                </div>

                <div class="d-flex justify-content-center mb-5">
                    
                    <a href="/generator" class="btn btn-outline-red px-5 py-2 me-3">REGENEREAZĂ</a>
                    
                    
                    <form th:action="@{/save-template}" method="POST">
                        
                        <input type="hidden" name="planHtml" th:value="${planAI}">
                        
                        
                        <input type="hidden" name="numeTemplate" value="Antrenament AI Personalizat">
                        
                        <button type="submit" class="btn btn-danger px-5 py-2">SALVEAZĂ CA TEMPLATE</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
