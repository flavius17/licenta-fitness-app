<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Select Exercises - 21 GYM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            padding-bottom: 50px;
        }

        /* NAVBAR */
        .navbar-custom { 
            background-color: #1a0505; 
            border-bottom: 2px solid #8B0000; 
            padding-top: 25px !important;    
            padding-bottom: 25px !important;
            min-height: 90px;
        }
        .brand-text { font-family: 'Black Ops One', cursive; text-transform: uppercase; font-size: 1.8rem; letter-spacing: 2px; color: #fff; line-height: 1; }
        .btn-back { color: #fff; font-size: 1.5rem; text-decoration: none; display: flex; align-items: center; justify-content: center; }
        .btn-back:hover { color: #ff3333; }

        /* CATEGORII */
        .scroll-container { display: flex; overflow-x: auto; gap: 15px; padding: 0 15px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .scroll-container::-webkit-scrollbar { display: none; }

        .card-wrapper { display: flex; flex-direction: column; align-items: center; cursor: pointer; min-width: 110px; transition: all 0.2s ease; flex-shrink: 0; }
        .card-label { font-family: 'Segoe UI', sans-serif; font-size: 0.9rem; font-weight: 600; color: #aaa; text-transform: capitalize; margin-bottom: 8px; transition: 0.3s; text-align: center; white-space: nowrap; }
        .visual-box { width: 100%; height: 90px; border-radius: 12px; border: 2px solid #333; background-color: #000; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .visual-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; transition: 0.3s; }

        .card-wrapper.active .card-label { color: #fff; text-shadow: 0 0 8px rgba(255, 51, 51, 0.6); }
        .card-wrapper.active .visual-box { border-color: #ff3333; box-shadow: 0 0 15px rgba(255, 51, 51, 0.3); }
        .card-wrapper.active .visual-box img { opacity: 1; }

        .main-row { padding-top: 20px; padding-bottom: 10px; }
        .sub-row { display: none; padding-top: 10px; padding-bottom: 15px; border-bottom: 1px solid #222; background-color: #080808; }

        /* LISTA */
        .section-header { padding: 15px; font-size: 0.8rem; font-weight: bold; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .exercise-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #222; background-color: #050505; }
        .ex-thumb { width: 50px; height: 50px; border-radius: 50%; background-color: #1a1a1a; overflow: hidden; margin-right: 15px; display: flex; align-items: center; justify-content: center; border: 1px solid #333; }
        .ex-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .ex-info { flex: 1; }
        .ex-name { font-weight: 600; font-size: 1rem; color: #fff; }
        .ex-meta { font-size: 0.8rem; color: #888; display: flex; align-items: center; gap: 5px; margin-top: 2px;}
        .btn-add-ex { width: 28px; height: 28px; border-radius: 6px; border: 2px solid #444; display: flex; align-items: center; justify-content: center; cursor: pointer; color: transparent; transition: 0.2s;}
        .btn-add-ex.selected { background-color: #ff3333; border-color: #ff3333; color: white; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark navbar-custom sticky-top">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            
            <div style="width: 100px; display: flex; align-items: center;">
                <a href="#" onclick="saveAndExit(); return false;" style="text-decoration: none; cursor: pointer; white-space: nowrap;">
                    <span style="font-family: 'Black Ops One', cursive; font-size: 1.8rem; color: #ffffff;">21</span>
                    <span style="font-family: 'Black Ops One', cursive; font-size: 1.8rem; color: #ff3333; margin-left: 5px;">GYM</span>
                </a>
            </div>
            
            <span class="brand-text text-center mx-auto">SELECT EXERCISES</span>
            
            <div style="width: 100px;"></div>
            
        </div>
    </nav>

    <div class="scroll-container main-row">
        <div class="card-wrapper main-card" data-group="Umeri">
            <span class="card-label">Shoulders</span>
            <div class="visual-box"><img src="/images/categories/cat_umeri.png" onerror="this.src='https://via.placeholder.com/150'"></div>
        </div>
        <div class="card-wrapper main-card" data-group="Piept">
            <span class="card-label">Chest & Waist</span>
            <div class="visual-box"><img src="/images/categories/cat_piept.png" onerror="this.src='https://via.placeholder.com/150'"></div>
        </div>
        <div class="card-wrapper main-card" data-group="Spate">
            <span class="card-label">Back</span>
            <div class="visual-box"><img src="/images/categories/cat_spate.png" onerror="this.src='https://via.placeholder.com/150'"></div>
        </div>
        <div class="card-wrapper main-card" data-group="Brate">
            <span class="card-label">Arms</span>
            <div class="visual-box"><img src="/images/categories/cat_brate.png" onerror="this.src='https://via.placeholder.com/150'"></div>
        </div>
        <div class="card-wrapper main-card" data-group="Picioare">
            <span class="card-label">Legs</span>
            <div class="visual-box"><img src="/images/categories/cat_picioare.png" onerror="this.src='https://via.placeholder.com/150'"></div>
        </div>
    </div>

    <div id="subFiltersRow" class="scroll-container sub-row"></div>

    <div class="section-header" id="listHeader">All Exercises</div>
    
    <div class="container-fluid px-0">
        <div class="exercise-item js-ex-item" 
             th:each="ex : ${exercitiiAll}" 
             th:data-group="${ex.grupaMare}" 
             th:data-muscle="${ex.muschiSpecific}">
             
            <div class="ex-thumb">
                <img th:src="@{'/images/' + ${ex.imagine}}" onerror="this.onerror=null; this.src='https://cdn-icons-png.flaticon.com/512/38/38464.png';">
            </div>
            <div class="ex-info">
                <div class="ex-name" th:text="${ex.nume}">Nume Exercitiu</div>
                <div class="ex-meta"><span th:text="${ex.muschiSpecific}">Muschi</span></div>
            </div>
            <div class="btn-add-ex" onclick="toggleSelect(this)"><i class="fas fa-check" style="font-size: 0.8rem;"></i></div>
        </div>
    </div>

    <script>
        const subData = {
            'Umeri': [ { name: 'Traps', img: 'traps.png', filterKey: 'Traps' }, { name: 'Delts', img: 'delts.png', filterKey: 'Delts' }],
            'Piept': [ { name: 'Pectorals', img: 'pectorals.png', filterKey: 'Chest' }, { name: 'Abs', img: 'abs.png', filterKey: 'Abs' }, { name: 'Serratus', img: 'serratus.png', filterKey: 'Serratus' } ],
            'Spate': [ { name: 'Lats', img: 'lats.png', filterKey: 'Lats' }, { name: 'Upper Back', img: 'upper_back.png', filterKey: 'UB' }, { name: 'Spine', img: 'spine.png', filterKey: 'Spine' } ],
            'Brate': [ { name: 'Biceps', img: 'biceps.png', filterKey: 'Biceps' }, { name: 'Triceps', img: 'triceps.png', filterKey: 'Triceps' }, { name: 'Forearms', img: 'forearms.png', filterKey: 'Forearms' } ],
            'Picioare': [ { name: 'Quads', img: 'quads.png', filterKey: 'Quads' }, { name: 'Hamstrings', img: 'hamstrings.png', filterKey: 'Hamstrings' }, { name: 'Calves', img: 'calves.png', filterKey: 'Calves' }, { name: 'Glutes', img: 'glutes.png', filterKey: 'Glutes' } ]
        };

        const mainCards = document.querySelectorAll('.main-card');
        const subRow = document.getElementById('subFiltersRow');
        const allItems = document.querySelectorAll('.js-ex-item');
        const listHeader = document.getElementById('listHeader');
        let activeGroup = null; let activeMuscleFilter = null;

        mainCards.forEach(card => {
            card.addEventListener('click', () => {
                const group = card.getAttribute('data-group');
                if (activeGroup === group) { resetAll(); return; }
                mainCards.forEach(c => c.classList.remove('active')); card.classList.add('active');
                activeGroup = group; activeMuscleFilter = null;
                renderSubRow(group); listHeader.innerText = group.toUpperCase(); applyFilters();
            });
        });

        function resetAll() {
            activeGroup = null; activeMuscleFilter = null;
            mainCards.forEach(c => c.classList.remove('active'));
            subRow.style.display = 'none'; listHeader.innerText = "All Exercises"; applyFilters();
        }

        function renderSubRow(groupName) {
            subRow.innerHTML = ''; const data = subData[groupName];
            if (data && data.length > 0) {
                data.forEach(item => {
                    const div = document.createElement('div'); div.className = 'card-wrapper sub-card-js';
                    div.innerHTML = `<span class="card-label">${item.name}</span><div class="visual-box" style="height: 80px; min-width: 100px;"><img src="/images/sub/${item.img}" onerror="this.src='https://via.placeholder.com/100'"></div>`;
                    div.onclick = () => {
                        if (activeMuscleFilter === item.filterKey) { activeMuscleFilter = null; div.classList.remove('active'); } 
                        else { document.querySelectorAll('.sub-card-js').forEach(sc => sc.classList.remove('active')); div.classList.add('active'); activeMuscleFilter = item.filterKey; }
                        applyFilters();
                    };
                    subRow.appendChild(div);
                }); subRow.style.display = 'flex';
            } else { subRow.style.display = 'none'; }
        }

        function applyFilters() {
            allItems.forEach(item => {
                const grp = item.getAttribute('data-group'); const msc = item.getAttribute('data-muscle');
                let show = true;
                if (activeGroup && grp !== activeGroup) show = false;
                if (activeGroup && activeMuscleFilter && !msc.includes(activeMuscleFilter)) show = false;
                item.style.display = show ? 'flex' : 'none';
            });
        }
        function toggleSelect(btn) { btn.classList.toggle('selected'); }

        function saveAndExit() {
            const selectedItems = [];
            document.querySelectorAll('.btn-add-ex.selected').forEach(btn => {
                const row = btn.closest('.exercise-item');
                selectedItems.push({ 
                    name: row.querySelector('.ex-name').innerText, 
                    img: row.querySelector('.ex-thumb img').src 
                });
            });

            if(selectedItems.length > 0) {
                let existing = JSON.parse(localStorage.getItem('currentWorkout')) || [];
                localStorage.setItem('currentWorkout', JSON.stringify(existing.concat(selectedItems)));
            }
            
            // --- MODIFICAREA IMPORTANTA AICI ---
            const returnPage = localStorage.getItem('returnPage') || '/log-workout';
            window.location.href = returnPage;
        }
    </script>
</body>
</html>
