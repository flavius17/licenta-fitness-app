<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>21 Gym - Înregistrare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3, h4, .navbar-brand, .btn, .form-label {
            font-family: 'Black Ops One', cursive !important;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .navbar-custom {
            background-color: #1a0505;
            border-bottom: 2px solid #8B0000;
        }

        .brand-logo {
            font-size: 2rem;
            color: #ff3333;
            text-shadow: 2px 2px 0px #000;
        }

        .card-custom {
            background-color: #141414;
            border: 1px solid #333;
            border-top: 5px solid #8B0000;
        }

        .form-label {
            color: #ffffff;
            font-size: 1rem;
            margin-bottom: 8px;
        }

        .form-control {
            background-color: #2b2b2b;
            border: 1px solid #444;
            color: white !important;
            padding: 10px;
            font-size: 1rem;
        }
        
        .form-control::placeholder {
            color: #888 !important;
        }

        .form-control:focus {
            background-color: #333;
            border-color: #ff3333;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.2);
        }

        .btn-rosu {
            background-color: #8B0000;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.3rem;
            width: 100%;
            margin-top: 15px;
            transition: 0.3s;
        }
        
        .btn-rosu:hover {
            background-color: #ff0000;
            color: white;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.6);
        }

        
        .password-container {
            position: relative;
        }
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #888;
            font-size: 1.2rem;
        }
        .toggle-password:hover {
            color: #ff3333; 
        }

    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom py-3 shadow">
        <div class="container">
            <a class="navbar-brand brand-logo" href="/">
                21 <span style="color: white;">GYM</span>
            </a>
        </div>
    </nav>

    <div class="container mt-5 text-center flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="row w-100 justify-content-center">
            
            <div class="col-lg-4 col-md-6"> 
                
                <h1 class="display-6 mb-4 text-white">
                    INTRĂ ÎN <span style="color: #ff3333;">ECHIPĂ</span>
                </h1>

                <div class="card card-custom p-4 shadow-lg">
                    
                    <form action="/register" method="post" class="text-start">
                        
                        <div class="mb-3">
                            <label class="form-label">ADRESĂ EMAIL</label>
                            <input type="email" name="email" class="form-control" placeholder="exemplu@email.com" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">PAROLĂ</label>
                            
                            <div class="password-container">
                                <input type="password" name="password" id="campParola" class="form-control" placeholder="••••••••" required>
                                <i class="bi bi-eye-slash toggle-password" id="butonOchi"></i>
                            </div>

                        </div>

                        <div class="mb-3">
                            <label class="form-label">VÂRSTĂ (ANI)</label>
                            <input type="number" name="varsta" class="form-control" placeholder="25" required>
                        </div>

                        <button type="submit" class="btn btn-rosu">
                            CREEAZĂ CONT
                        </button>

                    </form>
                    
                </div>

            </div>
        </div>
    </div>

    <script>
        const butonOchi = document.querySelector('#butonOchi');
        const campParola = document.querySelector('#campParola');

        butonOchi.addEventListener('click', function () {
            
            const type = campParola.getAttribute('type') === 'password' ? 'text' : 'password';
            
            
            campParola.setAttribute('type', type);
            
            
            this.classList.toggle('bi-eye');
            this.classList.toggle('bi-eye-slash');
        });
    </script>

</body>
</html>
