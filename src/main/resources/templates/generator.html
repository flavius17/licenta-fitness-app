<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Generator - 21 GYM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <!-- Adăugat FontAwesome pentru iconițe -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { background-color: #050505; color: white; font-family: 'Segoe UI', sans-serif; }
        .navbar-custom { background-color: #1a0505; border-bottom: 2px solid #8B0000; }
        .gym-logo { font-family: 'Black Ops One'; font-size: 2rem; color: white; }
        .red-text { color: #ff3333; }
        .card-custom { background-color: #111; border: 1px solid #333; border-radius: 15px; padding: 2rem; }
        .form-label { color: #aaa; font-weight: bold; text-transform: uppercase; font-size: 0.9rem; }
        .form-select, .form-control { background-color: #1a1a1a; border: 1px solid #444; color: white; padding: 0.8rem; }
        .form-select:focus, .form-control:focus { background-color: #222; color: white; border-color: #ff3333; box-shadow: none; }
        textarea.form-control::placeholder { color: #666; font-style: italic; }
        .btn-red { background: linear-gradient(90deg, #8B0000 0%, #ff3333 100%); color: white; border: none; font-family: 'Black Ops One'; transition: 0.3s; }
        .btn-red:hover { transform: scale(1.02); color: white; opacity: 0.9; }
    </style>
</head>
<body>

    <!-- NAVBAR IDENTIC CU RESTUL PAGINILOR -->
    <nav class="navbar navbar-dark navbar-custom py-3 mb-5">
        <div class="container">
            <a href="/dashboard" class="navbar-brand gym-logo">21 <span class="red-text">GYM</span> AI</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card-custom shadow-lg">
                    <h2 class="text-center mb-4" style="font-family: 'Black Ops One';">GENERATOR <span class="red-text">INTELIGENT</span></h2>
                    <p class="text-center text-secondary mb-4">Răspunde la întrebări și AI-ul va alege cele mai bune exerciții pentru tine.</p>

                    <form action="/generate-plan" method="POST">
                        <div class="mb-4">
                            <label class="form-label">Nivelul Experienței:</label>
                            <select name="nivel" class="form-select">
                                <option value="incepator">Începător (0-6 luni)</option>
                                <option value="intermediar">Intermediar (6-24 luni)</option>
                                <option value="avansat">Avansat (2+ ani)</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Obiectiv Principal:</label>
                            <select name="scop" class="form-select">
                                <option value="masa">Masă Musculară (Hypertrophy)</option>
                                <option value="slabire">Slăbire & Definire</option>
                                <option value="forta">Forță pură (Powerlifting style)</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Câte zile pe săptămână poți merge?</label>
                            <input type="number" name="zile" class="form-control" min="1" max="7" value="3">
                        </div>

                        <!-- CÂMPUL NOU PENTRU DETALII / PROBLEME MEDICALE -->
                        <div class="mb-4">
                            <label class="form-label" style="color: #ffc107;">
                                <i class="fas fa-notes-medical me-2"></i>Condiții medicale sau preferințe (Opțional):
                            </label>
                            <textarea name="detalii" class="form-control" rows="3" placeholder="Ex: Am hernie de disc, mă doare umărul drept la împins, nu vreau să fac genuflexiuni..."></textarea>
                            <small class="text-secondary mt-1 d-block">AI-ul nostru va adapta planul strict după nevoile tale de sănătate.</small>
                        </div>

                        <button type="submit" class="btn btn-red w-100 py-3 fs-5 mt-2">GENEREAZĂ PLANUL MEU</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
