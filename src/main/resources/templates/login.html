<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>21 Gym - Logare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3, .navbar-brand, .btn, .form-label, .alert-message {
            font-family: 'Black Ops One', cursive !important;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .navbar-custom {
            background-color: #1a0505;
            border-bottom: 2px solid #8B0000;
        }

        .brand-logo {
            font-size: 2rem;
            color: #ff3333;
            text-shadow: 2px 2px 0px #000;
        }

        .card-custom {
            background-color: #141414;
            border: 1px solid #333;
            border-top: 5px solid #8B0000;
        }

        .form-label { color: #ffffff; margin-bottom: 8px; }

        .form-control {
            background-color: #2b2b2b;
            border: 1px solid #555;
            color: #ffffff !important; 
            padding: 12px;
            font-size: 1.1rem;
        }
        
        .form-control::placeholder {
            color: #cccccc !important;
            opacity: 1;
        }

        .form-control:focus {
            background-color: #333;
            border-color: #ff3333;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.2);
        }

        .btn-rosu {
            background-color: #8B0000;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.3rem;
            width: 100%;
            margin-top: 15px;
            transition: 0.3s;
        }
        .btn-rosu:hover {
            background-color: #ff0000;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.6);
        }

        /* Stil pentru butonul Google */
        .btn-google {
            background-color: #1a1a1a;
            color: white;
            border: 1px solid #555;
            padding: 10px 30px;
            font-size: 1.1rem;
            width: 100%;
            transition: 0.3s;
        }
        .btn-google:hover {
            background-color: #333;
            border-color: #ea4335;
            box-shadow: 0 0 15px rgba(234, 67, 53, 0.4);
        }

        /* Container pentru parola si ochi */
        .password-container { 
            position: relative; 
        }
        
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 42px; /* Ajustat pentru pozitionare corecta */
            cursor: pointer;
            color: #cccccc;
            font-size: 1.3rem;
            z-index: 10;
        }
        .toggle-password:hover { color: #ff3333; }

        /* Stil pentru mesajul de eroare */
        .alert-error {
            background-color: #330000;
            color: #ff6666;
            border: 1px solid #ff3333;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            text-align: center;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom py-3 shadow">
        <div class="container">
            <a class="navbar-brand brand-logo" href="/">
                21 <span style="color: white;">GYM</span>
            </a>
        </div>
    </nav>

    <div class="container mt-5 text-center flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="row w-100 justify-content-center">
            <div class="col-lg-4 col-md-6"> 
                
                <h1 class="display-6 mb-4 text-white">
                    BINE AI VENIT <span style="color: #ff3333;">ÎNAPOI</span>
                </h1>

                <div class="card card-custom p-4 shadow-lg">
                    
                    <div th:if="${param.error}" class="alert-error alert-message">
                        ⚠ Email sau parolă incorectă!
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3 text-start">
                            <label for="email" class="form-label">ADRESĂ EMAIL</label>
                            <input type="text" 
                                   name="username"  
                                   class="form-control" 
                                   placeholder="exemplu@email.com" 
                                   required>
                        </div>

                        <div class="mb-3 text-start password-container">
                            <label for="campParola" class="form-label">PAROLĂ</label>
                            <i class="bi bi-eye-slash toggle-password" id="butonOchi"></i>
                            
                            <input type="password" 
                                   name="password" 
                                   id="campParola"
                                   class="form-control" 
                                   placeholder="********" 
                                   required>
                        </div>

                        <button type="submit" class="btn btn-rosu w-100">INTRĂ ÎN CONT</button>
                    </form>

                    <!-- SECTIUNEA PENTRU GOOGLE OAUTH2 -->
                    <div class="mt-4">
                        <div class="d-flex align-items-center mb-3">
                            <hr class="flex-grow-1" style="border-color: #555;">
                            <span class="mx-2 text-secondary" style="font-family: 'Segoe UI', sans-serif; font-size: 0.9rem;">SAU</span>
                            <hr class="flex-grow-1" style="border-color: #555;">
                        </div>
                        
                        <a th:href="@{/oauth2/authorization/google}" class="btn btn-google">
                            <i class="bi bi-google me-2" style="color: #ea4335;"></i> LOGIN CU GOOGLE
                        </a>
                    </div>
                    <!-- SFARSIT SECTIUNE GOOGLE -->
                    
                </div>
                
                <div class="mt-3">
                    <a href="/register" class="text-secondary text-decoration-none small">
                        Nu ai cont? Înregistrează-te aici.
                    </a>
                </div>

            </div>
        </div>
    </div>

    <script>
        const butonOchi = document.querySelector('#butonOchi');
        const campParola = document.querySelector('#campParola');

        if(butonOchi && campParola) {
            butonOchi.addEventListener('click', function () {
                // Comuta intre text si password
                const type = campParola.getAttribute('type') === 'password' ? 'text' : 'password';
                campParola.setAttribute('type', type);
                
                // Schimba iconita
                this.classList.toggle('bi-eye');
                this.classList.toggle('bi-eye-slash');
            });
        }
    </script>

</body>
</html>
